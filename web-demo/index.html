<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>automotive — WebUSB CAN demo</title>
    <link data-trunk rel="rust" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 60rem;
      }
      button {
        font-size: 1rem;
        padding: 0.5rem 1rem;
      }
      #output {
        margin-top: 1rem;
        padding: 1rem;
        background: #111;
        color: #0f0;
        font-family: ui-monospace, monospace;

      }

  <body>
    <h1>automotive — WebUSB CAN demo</h1>
    <p>
      Connects to the first available comma.ai panda over WebUSB and prints incoming CAN

    </p>
    <button id="connect">Connect to panda</button>
    <pre id="output"></pre>
